<div class="min-h-screen bg-white font-sans antialiased text-slate-900">
  <nav class="sticky top-0 z-50 border-b border-slate-100 bg-white/80 backdrop-blur-md">
    <div class="mx-auto flex max-w-7xl items-center justify-between px-4 sm:px-6 py-3 sm:py-4">
      <div class="flex items-center gap-2">
        <div
          class="flex h-9 w-9 sm:h-10 sm:w-10 items-center justify-center rounded-xl bg-indigo-600 font-black text-white shadow-lg shadow-indigo-200"
        >
          P
        </div>
        <span class="text-xl sm:text-2xl font-black tracking-tight">Prodeus</span>
      </div>

      <div class="flex items-center gap-3 sm:gap-6">
        <a
          routerLink="/login"
          class="text-xs sm:text-sm font-bold text-slate-600 hover:text-indigo-600 transition-colors"
          >Entrar</a
        >
        <app-button
          routerLink="/register"
          [queryParams]="{ mode: 'company' }"
          variant="dark"
          size="sm"
          class="!px-4 sm:!px-6 !py-2 sm:!py-2.5 text-[10px] sm:text-xs"
        >
          <span class="hidden sm:inline">Crear cuenta empresa</span>
          <span class="sm:hidden">Empezar</span>
        </app-button>
      </div>
    </div>
  </nav>

  <section class="relative overflow-hidden px-6 pt-16 pb-24 sm:pt-24 sm:pb-32 lg:pt-32">
    <div
      class="absolute top-0 -z-10 h-full w-full bg-[radial-gradient(circle_at_top_right,var(--tw-gradient-stops))] from-indigo-50 via-white to-white opacity-60"
    ></div>

    <div class="mx-auto max-w-5xl text-center">
      <div
        class="mb-6 inline-flex items-center rounded-full border border-indigo-100 bg-indigo-50 px-4 py-1 text-xs font-bold text-indigo-700"
      >
        ⚽ Mundial 2026 Ready
      </div>
      <h1 class="mb-6 sm:mb-8 text-4xl sm:text-6xl font-black tracking-tight text-slate-900 lg:text-8xl leading-tight">
        El prode que <br />
        <span class="bg-linear-to-r from-indigo-600 to-emerald-500 bg-clip-text text-transparent"
          >une a tu equipo.</span
        >
      </h1>
      <p class="mx-auto mb-10 max-w-2xl text-base sm:text-lg leading-relaxed text-slate-500 font-medium">
        Aumenta el compromiso de tus empleados con la plataforma de predicciones deportivas más
        moderna. Fácil de usar, automática y diseñada para empresas.
      </p>

      <div class="flex flex-col items-center justify-center gap-4 sm:flex-row">
        <app-button routerLink="/register" size="lg" class="w-full sm:w-auto !px-8 !py-5 text-lg">
          Empezar ahora — Gratis
        </app-button>
        <app-button variant="outline" size="lg" class="w-full sm:w-auto !px-8 !py-5 text-lg">
          Ver demo en vivo
        </app-button>
      </div>
    </div>
  </section>


  <app-footer></app-footer>
</div>
