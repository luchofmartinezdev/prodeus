<div class="max-w-4xl mx-auto space-y-6 sm:space-y-8 p-1 sm:p-0">
  
  <app-immersive-banner 
    [title]="'¡Hola, ' + auth.user()?.displayName + '! 👋'"
    [subtitle]="auth.user()?.role === 'admin' ? 'Administrador de Empresa - Gestioná tu equipo' : 'Miembro Prodeus - Demostrá tus conocimientos'"
    [icon]="'👤'"
    [accentLabel]="'Nivel Actual'"
    [accentValue]="'Elite'">
  </app-immersive-banner>

  <!-- Stats Grid -->
  <div class="grid grid-cols-2 md:grid-cols-2 lg:grid-cols-4 gap-4 sm:gap-6">
    <app-stats-card label="Puntos Totales" [value]="auth.user()?.totalPoints" unit="pts"></app-stats-card>
    <app-stats-card label="Ranking Empresa" [value]="'#' + (auth.user()?.rank || '-')" tag="Nivel 4" tagColor="amber"></app-stats-card>
    <app-stats-card label="Ranking Global" [value]="'#' + (auth.user()?.globalRank || '-')" tag="Top 5%" tagColor="slate"></app-stats-card>
    <app-stats-card label="Precisión" [value]="(auth.user()?.accuracy || 0) + '%'" tag="🎯 Muy Alta" tagColor="emerald"></app-stats-card>
  </div>

  <!-- Actividad y Configuración -->
  <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 sm:gap-8">
    <div class="lg:col-span-2 bg-white rounded-3xl sm:rounded-[2.5rem] border border-slate-200 p-5 sm:p-8 shadow-sm">
      <div class="flex items-center justify-between mb-6 sm:mb-8 gap-4">
        <h3 class="text-lg sm:text-xl font-black text-slate-900 uppercase tracking-tight">Actividad Reciente</h3>
        <span class="text-[9px] sm:text-[10px] font-bold text-slate-400 uppercase tracking-widest">{{ auth.user()?.predictionsCount }} Predicciones</span>
      </div>
      
      <div class="space-y-3 sm:space-y-4">
        @for (item of [1,2,3]; track item) {
          <div class="flex items-center justify-between p-3 sm:p-4 rounded-xl sm:rounded-2xl bg-slate-50 border border-slate-100 group hover:border-indigo-100 hover:bg-white transition-all">
            <div class="flex items-center gap-3 sm:gap-4">
              <div class="h-9 w-9 sm:h-10 sm:w-10 rounded-xl bg-white border border-slate-200 flex items-center justify-center text-base sm:text-lg shadow-sm">
                {{ item === 1 ? '🇦🇷' : '🇧🇷' }}
              </div>
              <div>
                <p class="text-xs sm:text-sm font-black text-slate-800 line-clamp-1">Catar 2022 - Final</p>
                <p class="text-[9px] sm:text-[10px] text-slate-400 font-bold uppercase">Hace 2 días</p>
              </div>
            </div>
            <div class="text-right">
              <span class="px-2 sm:px-3 py-1 rounded-lg bg-emerald-50 text-emerald-600 text-[8px] sm:text-[10px] font-black">+15 pts</span>
            </div>
          </div>
        }
      </div>
    </div>

    <div class="bg-white rounded-3xl sm:rounded-[2.5rem] border border-slate-200 p-6 sm:p-8 shadow-sm flex flex-col justify-between">
      <div>
        <h3 class="text-lg sm:text-xl font-black text-slate-900 uppercase tracking-tight mb-6 sm:mb-8">Cuenta</h3>
        
        <div class="mb-6 flex flex-col items-center p-4 bg-slate-50 rounded-2xl sm:rounded-3xl border border-slate-100">
            <img [src]="auth.user()?.photoURL || 'https://ui-avatars.com/api/?name=' + auth.user()?.displayName" class="h-14 w-14 sm:h-16 sm:w-16 rounded-xl sm:rounded-2xl mb-3 shadow-md border-2 border-white">
            <p class="font-black text-slate-800 text-sm italic">{{ auth.user()?.displayName }}</p>
            <app-badge class="mt-2" variant="secondary">
              {{ auth.user()?.role === 'admin' ? 'Admin' : 'Usuario' }}
            </app-badge>
        </div>

        <div class="space-y-1">
            <button class="w-full flex items-center justify-between p-3 sm:p-4 rounded-xl sm:rounded-2xl hover:bg-slate-50 transition-all group">
                <span class="text-xs sm:text-sm font-bold text-slate-600 group-hover:text-slate-900">Editar Información</span>
                <span class="text-slate-300">→</span>
            </button>
            <button class="w-full flex items-center justify-between p-3 sm:p-4 rounded-xl sm:rounded-2xl hover:bg-slate-50 transition-all group">
                <span class="text-xs sm:text-sm font-bold text-slate-600 group-hover:text-slate-900">Notificaciones</span>
                <span class="text-indigo-500 font-black text-[9px] sm:text-[10px] uppercase">ON</span>
            </button>
        </div>
      </div>

      <button (click)="auth.logout()"
        class="mt-8 w-full py-4 bg-red-50 text-red-600 font-black rounded-2xl hover:bg-red-600 hover:text-white transition-all active:scale-95 text-[10px] sm:text-xs uppercase tracking-widest">
        Cerrar Sesión Segura
      </button>
    </div>
  </div>
</div>
