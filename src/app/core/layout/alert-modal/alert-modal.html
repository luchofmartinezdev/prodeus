@if (state; as info) {
  <div class="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm transition-all duration-300">
    
    <div class="relative w-full max-w-[340px] overflow-hidden rounded-[2.5rem] bg-white p-8 shadow-2xl shadow-slate-900/40 border border-slate-100 transform transition-all scale-100 opacity-100">
      
      <!-- Icono contextual -->
      <div class="mb-6 flex justify-center">
        <div class="h-20 w-20 rounded-[2rem] flex items-center justify-center text-4xl shadow-sm ring-[12px] transition-all"
          [ngClass]="{
            'bg-emerald-50 text-emerald-500 ring-emerald-50/50': info.type === 'success',
            'bg-red-50 text-red-500 ring-red-50/50': info.type === 'error',
            'bg-amber-50 text-amber-500 ring-amber-50/50': info.type === 'warning',
            'bg-indigo-50 text-indigo-500 ring-indigo-50/50': info.type === 'info'
          }">
          
          @if (info.type === 'success') { <span>✅</span> }
          @if (info.type === 'error') { <span>🛑</span> }
          @if (info.type === 'warning') { <span>⚠️</span> }
          @if (info.type === 'info') { <span>💡</span> }
        </div>
      </div>

      <!-- Texto -->
      <div class="text-center">
        <h3 class="text-xl font-black text-slate-900 uppercase tracking-tighter leading-none">{{ info.title }}</h3>
        <p class="mt-3 text-[13px] font-medium text-slate-500 leading-relaxed">{{ info.message }}</p>
      </div>

      <!-- Botones -->
      <div class="mt-8 flex flex-col gap-2">
        <button (click)="confirm()"
          class="w-full rounded-2xl py-4 text-[10px] font-black uppercase tracking-[0.1em] shadow-xl transition-all active:scale-95 text-white"
          [ngClass]="{
            'bg-slate-900 hover:bg-slate-800 shadow-slate-900/20': info.type !== 'error',
            'bg-red-600 hover:bg-red-500 shadow-red-600/20': info.type === 'error'
          }">
          {{ info.confirmText }}
        </button>

        @if (info.showCancel) {
          <button (click)="cancel()"
            class="w-full rounded-2xl py-4 text-[10px] font-black uppercase tracking-widest text-slate-400 hover:bg-slate-50 hover:text-slate-600 transition-all">
            {{ info.cancelText }}
          </button>
        }
      </div>

      <!-- Decoración de fondo del modal -->
      <div class="absolute -right-10 -bottom-10 h-32 w-32 rounded-full bg-slate-50 opacity-50 -z-10"></div>
    </div>
  </div>
}
